server:
  port: 8080
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

spring:
  application:
    name: library-server

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/library_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456

  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.library.entity

jwt:
  secret: library-secret-key
  expire: 86400000

upload:
  path: /uploads/book

knife4j:
  enable: true
  setting:
    enable-swagger-resources: true
    enable-document-manage: true
  openapi:
    title: 智慧图书管理系统 API
    description: 智慧图书管理系统接口文档
    version: 1.0
    contact:
      name: library-server

logging:
  level:
    com.library: debug
    com.baomidou.mybatisplus: debug
